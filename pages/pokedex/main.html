<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, <initial-scale=1.0">
    <title>Poptart's Pokedex</title>
    <link rel="stylesheet" href="background.css">
    <link rel="stylesheet" href="pokedex.css">
    <link rel="icon" type="image/x-icon" href="/image/bajablast.png">
</head>
<body>
    <!-- Header -->
    <header>
        <h1 class="site-title">Poptart's Chronic Illness Pokedex</h1>
    </header>
    <div class="column left">
        <div class="music">
            <audio id="audio" src="music.mp4"></audio>
            <a onClick="togglePlay()"><img src="pokeball.gif"></a>
        </div>

        <!-- <h2>Make a drop down list based on JSON data.</h2> -->

    </div>
        <div class="column main">
            <div id="pokedex">
                <div id="left">
                    <div id="logo"></div>
                    <div id="bg_curve1_left"></div>
                    <div id="bg_curve2_left"></div>
                    <div id="curve1_left">
                    <div id="buttonGlass">
                        <div id="reflect"> </div>
                    </div>
                    <div id="miniButtonGlass1"></div>
                    <div id="miniButtonGlass2"></div>
                    <div id="miniButtonGlass3"></div>
                    </div>
                    <div id="curve2_left">
                    <div id="junction">
                        <div id="junction1"></div>
                        <div id="junction2"></div>
                    </div>
                    </div>
                    <div id="screen">
                    <div id="topPicture">
                        <div id="buttontopPicture1"></div>
                        <div id="buttontopPicture2"></div>
                    </div>
                    <div id="picture">
                        <img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/200653/psykokwak.gif" alt="psykokwak" height="170" />
                    </div>
                    <div id="buttonbottomPicture"></div>
                    <div id="speakers">
                        <div class="sp"></div>
                        <div class="sp"></div>
                        <div class="sp"></div>
                        <div class="sp"></div>
                    </div>
                    </div>
                    <div id="bigbluebutton"></div>
                    <div id="barbutton1"></div>
                    <div id="barbutton2"></div>
                    <div id="cross">
                    <div id="leftcross">
                        <div id="leftT"></div>
                    </div>
                    <div id="topcross">
                        <div id="upT"></div>
                    </div>
                    <div id="rightcross">
                        <div id="rightT"></div>
                    </div>
                    <div id="midcross">
                        <div id="midCircle"></div>
                    </div>
                    <div id="botcross">
                        <div id="downT"></div>
                    </div>
                    </div>
                </div>
                <div id="right">
                    <div id="stats">
                        <!-- <button class="button" id="demo3" onClick="loadDetails()"></button>  -->
                    <br/>
                        <strong>Name: </strong><p id="itemName"></p>
                        <strong>Found: </strong><p id="itemFound"></p>
                        <strong>Size: </strong><p id="itemSize"></p>
                        <strong>Note: </strong><p id="itemNote"></p>
                        <strong>URL: </strong><p id="itemURL"></p>
                    </div>
                    <div id="blueButtons1">
                        <div class="blueButtonLong">
                        <button class="button" id="demo3"></button>
                        <!-- <i class="fa fa-caret-down"></i> -->
                        </div>
                    <!-- <div class="blueButton"></div>
                    <!-- <div class="blueButton"></div> -->
                    <div class="blueButton"><button class="blueButton" onClick="loadDetails()"></button> 
</div>
                    <!-- <div class="blueButton"></div> --> 
                    </div>
                    <div id="blueButtons2">
                    <div class="blueButton"></div>
                    <div class="blueButton"></div>
                    <div class="blueButton"></div>
                    <div class="blueButton"></div>
                    <div class="blueButton"></div>
                    </div>
                    <div id="miniButtonGlass4"></div>
                    <div id="miniButtonGlass5"></div>
                    <div id="barbutton3"></div>
                    <div id="barbutton4"></div>
                    <div id="yellowBox1"></div>
                    <div id="yellowBox2"></div>
                    <div id="bg_curve1_right"></div>
                    <div id="bg_curve2_right"></div>
                    <div id="curve1_right"></div>
                    <div id="curve2_right"></div>
                    <!-- <div id="curve3_right"></div> -->
                </div>
            </div>
        </div>
    <script src="pokedexMusic.js" defer></script>
    <script src="pokedex.js" defer></script>

</body>        
</html>
