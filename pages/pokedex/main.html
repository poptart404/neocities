<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, <initial-scale=1.0">
    <title>Poptart's Pokedex</title>
    <link rel="stylesheet" href="background.css">
    <link rel="icon" type="image/x-icon" href="/image/bajablast.png">
</head>
<body>
    <!-- Header -->
    <header>
        <h1 class="site-title">Poptart's Chronic Illness Pokedex</h1>
    </header>
    <div class="column left">
        <div class="music">
            <audio id="audio" src="music.mp4"></audio>
            <a onClick="togglePlay()"><img src="pokeball.gif"></a>
        </div>
    </div>
        <div class="column main">
            <div id="include-here"></div>
            <script>
                fetch('pokedex.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('include-here').innerHTML = data;
                });
            </script>
            <script src="pokedexMusic.js" defer></script>
        </div>
</body>        
</html>
